name: CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install PNPM
        run: npm install pnpm -g

      - name: Install
        run: pnpm i

      - name: Allcheck
        run: pnpm run allcheck
